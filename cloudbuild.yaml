# Used for Cloud Build CI/CD
steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'

# 3. Run Django Database Migrations via Cloud SQL Proxy (THE NEW STEP)
  - name: 'gcr.io/google-appengine/exec-wrapper'
    args:
      - '-i'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '-s'
      - '$_DB_CONNECTION_NAME'
      - '-e'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '-e'
      - 'DJANGO_SETTINGS_MODULE=src.config.settings.production'
      - '--'
      - 'python'
      - 'manage.py'
      - 'migrate'
      - '--noinput'

  # 4. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--add-cloudsql-instances=$_DB_CONNECTION_NAME'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,DJANGO_SETTINGS_MODULE=src.config.settings.production,ALLOWED_HOSTS=*,MONDAY_BOARD_ID=$_MONDAY_BOARD_ID,ENTRA_CLIENT_ID=$_ENTRA_CLIENT_ID,ENTRA_TENANT_ID=$_ENTRA_TENANT_ID,DATABASE_CONNECTION_NAME=$_DB_CONNECTION_NAME,BASE_URL=https://insighters-workflow-automation-428824878696.us-central1.run.app'

  # Optional: Best Practice for Auditing and UI purposes
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: 'us-central1'
  _REPO_NAME: 'insighters-repo'
  _SERVICE_NAME: 'insighters-workflow-automation'
  _DB_CONNECTION_NAME: 'insighters-app:us-central1:insighters-prod-db'
  _MONDAY_BOARD_ID: '18402769675'
  _ENTRA_CLIENT_ID: '8e096945-0d70-405d-820a-1aae9f25da14'
  _ENTRA_TENANT_ID: 'common'