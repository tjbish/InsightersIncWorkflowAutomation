{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>Admin Dashboard | Insighters Inc</title>
  <style>
    .cta-button {
      display: inline-block;
      padding: 10px 16px;
      border: 1px solid #222;
      background: #e6e6e6;
      color: #111;
      text-decoration: none;
      border-radius: 6px;
      transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
    }

    .cta-button:hover,
    .cta-button:focus-visible {
      background: #d2d2d2;
      border-color: #111;
      color: #000;
    }

    .main-style {
      min-height: 100vh;
      margin: 0;
      background: url('{% static "background.jpg" %}') center / cover no-repeat;
      display: flex;
      align-items: center;
    }
  </style>
</head>

<body>
  <main class="main-style">
    <div style="width: 33.3333%; padding: 32px 32px 32px 64px;">
      <div style="text-align: left; max-width: 360px;">
        <a href="https://myinsighters.com/" style="display: inline-block;">
          <img src="{% static 'insightersLogo.jpg' %}" alt="Insighters Inc logo"
            style="max-width: 500px; height: auto; margin-bottom: 16px;" />
        </a>
        <h2 style="margin: 0 0 8px; text-align: left;">Insighters Inc Workflow Automation Dashboard </h2>
        <div class="mt-4">
          <label for="client-email" class="form-label">Client Email</label>
          <input id="client-email" name="client_email" type="email" class="form-control" maxlength="100"
            placeholder="client@example.com" />
          <div class="d-grid gap-2 mt-3">
            <button type="button" class="btn btn-secondary">Send Business Form</button>
            <button type="button" class="btn btn-secondary">Send Individual Form</button>
          </div>
        </div>
      </div>
    </div>
  </main>

</body>

</html>
